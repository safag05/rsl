    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams</title>
    <link rel="stylesheet" href="team.css">
    <link rel="icon" href="./images/favicon.png" type="image/png">
</head>
<script src="nav.js"></script>
<body>
    <header>
        <h1>TEAMS</h1>
        <button class="menu-toggle" id="menuToggle">
            ☰ <span>Menu</span> ⚽
        </button>
        <nav>
            <ul>
                <li class="always-show"><a href="./">🏠 HOME</a></li>

                <li class="menu-only"><a href="./rules">📜 RULES</a></li>
                
                <li class="always-show"><a href="./fixtures">📅 FIXTURES</a></li>
              
                <li class="menu-only"><a href="./league_points">🏆 POINTS</a></li>

                <li class="menu-only"><a href="./teams">👥 TEAMS</a></li>
              
                <li class="menu-only">
                    <select id="myDropdown">
                        <option value="" selected disabled>🗂️ ARCHIVE</option>
                      
                        <optgroup label="Archive - 2024">
                          <option value="./archive/2024_league_points">League</option>
                          <option value="./archive/2024_group_a_points">Group A</option>
                          <option value="./archive/2024_group_b_points">Group B</option>
                        </optgroup>
                      
                        <optgroup label="Archive - 2023">
                          <option value="./archive/2023">League</option>
                        </optgroup>
                    </select>
                </li>            
            </ul>
        </nav>
    </header>

    <main>
        <section class="points">
            <h2>RSL 2026 Teams</h2>
            <table>
                <thead>
                    <tr>
                        <th></th>
                        <th>TEAMS</th>
                    </tr>                    
                </thead>
                <tbody id="teams-table-body">
                    </tbody>
            </table>
        </section>
    </main>

    <footer>
        <!-- Footer content -->
    </footer>

    <script>
        fetch('/data/teams.json')
            .then(response => {
                if (!response.ok) throw new Error("Could not load teams.json");
                return response.json();
            })
            .then(data => {
                const tbody = document.getElementById('teams-table-body');
                let html = '';

                // Loop through each team and create a row
                // The 'index' automatically counts starting from 0, so we do index + 1 for the numbers
                data.teams.forEach((team, index) => {
                    html += `
                    <tr>
                        <td>${index + 1}</td>
                        <th>${team.name}</th>
                    </tr>`;
                });

                // Inject the generated rows into the table body
                tbody.innerHTML = html;
            })
            .catch(error => {
                console.error("Error loading teams:", error);
                document.getElementById('teams-table-body').innerHTML = `<tr><td colspan="2">Error loading teams.</td></tr>`;
            });
    </script>
</body>
</html>

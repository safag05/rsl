                    // JavaScript to handle dropdown change event

                            window.location.href = selectedOption;
                        }

        <!-- 
            example of how to use different class
            1) when the games are on a future date:
            <section class="fixtures">

                <table>

            2) when the games are compeleted:
            <section class="done">
                <h2>Week #<PUT WEEK #</h2>

            <section class="current">

name: Match Day Reminder

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    env:
      # This tells GitHub to use Node 24 for the engine
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # This tells GitHub you acknowledge the risk of using an unsecure/deprecated node version
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true' 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script
        env:
          WHATSAPP_NUMBERS: ${{ secrets.WHATSAPP_NUMBERS }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
        run: python generate_message.py
name: Match Day Reminder

on:
  schedule:
    # Runs at 14:00 UTC (10:00 AM EST time) on Tuesday, Wednesday, and Thursday
    - cron: '20 19 * * 2,3,4'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Script
        env:
          # New CallMeBot Secrets
          WHATSAPP_NUMBERS: ${{ secrets.WHATSAPP_NUMBERS }}
          CALLMEBOT_API_KEYS: ${{ secrets.CALLMEBOT_API_KEYS }}
        run: python generate_message.py
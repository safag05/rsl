name: Match Day Reminder

on:
  schedule:
    - cron: '0 14 * * *' # 10:00 AM EST (approx)
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    env:
      # 1. FIX: This forces the runner to use Node 24 and stops the deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # 2. FIX: Setting this explicitly removes the "python-version not set" warning
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script
        env:
          # Pulling hidden secrets from your GitHub settings
          WHATSAPP_NUMBERS: ${{ secrets.WHATSAPP_NUMBERS }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
        run: python generate_message.py
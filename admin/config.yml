backend:
  name: github
  repo: safag05/rsl
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "data_files"
    label: "Data Files"
    files:
      - name: "teams"
        label: "Teams"
        file: "data/teams.json"
        fields:
          - label: "Teams"
            name: "teams"
            widget: "list"
            fields:
              - { label: "Team Name", name: "name", widget: "string" }

      - name: "fixtures"
        label: "Fixtures"
        file: "data/fixtures.json"
        fields:
          - label: "Weeks"
            name: "weeks"
            widget: "list"
            fields:
              - { label: "Week Name", name: "week", widget: "string", hint: "e.g. Week 1" }
              - { label: "Announcement", name: "announcement", widget: "text", required: false }
              - label: "Days"
                name: "days"
                widget: "list"
                fields:
                  - { label: "Date Header", name: "dateHeader", widget: "string", hint: "e.g. Tuesday - 04/07/2026" }
                  - label: "Games"
                    name: "games"
                    widget: "list"
                    fields:
                      - label: "Home Team"
                        name: "home"
                        widget: "relation"
                        collection: "data_files"
                        file: "teams"
                        search_fields: ["teams.*.name"]
                        display_fields: ["teams.*.name"]
                        value_field: "teams.*.name"
                      - { label: "Home Score", name: "homeScore", widget: "string", default: "TBD" }
                      - { label: "Away Score", name: "awayScore", widget: "string", default: "TBD" }
                      - label: "Away Team"
                        name: "away"
                        widget: "relation"
                        collection: "data_files"
                        file: "teams"
                        search_fields: ["teams.*.name"]
                        display_fields: ["teams.*.name"]
                        value_field: "teams.*.name"

          # --- NEW PLAYOFFS SECTION ---
          - label: "Playoffs"
            name: "playoffs"
            widget: "list"
            fields:
              - { label: "Round Name", name: "round", widget: "string" }
              - label: "Days"
                name: "days"
                widget: "list"
                fields:
                  - { label: "Actual Date", name: "date", widget: "string", hint: "e.g. Tuesday - 06/16/2026" } # <--- Add this
                  - { label: "Division/Header", name: "dateHeader", widget: "string", hint: "e.g. Division A Semifinals" }
                  - label: "Games"
                    name: "games"
                    widget: "list"
                    fields:
                      - { label: "Match Label", name: "label", widget: "string", hint: "e.g. Championship Game", required: false }
                      - label: "Home Team"
                        name: "home"
                        widget: "string" # Using string here because team names might be "Winner of Game 1" before finalized
                      - { label: "Home Score", name: "homeScore", widget: "string", default: "TBD" }
                      - { label: "Away Score", name: "awayScore", widget: "string", default: "TBD" }
                      - label: "Away Team"
                        name: "away"
                        widget: "string"